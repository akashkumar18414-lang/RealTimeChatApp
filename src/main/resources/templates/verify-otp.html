<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>College ERP – Verify Code</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" th:href="@{/css/verify-otp.css}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <!-- Theme toggle -->
    <button class="theme-switch" id="themeToggle" aria-label="Toggle dark mode">
      <span class="icon" id="themeIcon" aria-hidden="true">🌙 </span>
      <span id="themeText">Light</span>
    </button>

    <main class="card" role="main" id="card">
      <section class="right">
        <header class="form-header" aria-labelledby="titleOtp">
          <div class="form-logo">
            <div class="mark" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2 9l10-5 10 5-10 5L2 9z"></path>
              </svg>
            </div>
            <span th:text="${collegeName} + '• ERP'"></span>
          </div>
          <h1 class="form-title" id="titleOtp">Enter verification code</h1>
          <p class="form-subtitle">We sent a 6-digit code to your email. Type the code below.</p>
          <p class="otp-intro" id="sentToText"></p>
        </header>
		<div th:if="${error}">
  	       <p style="color:red;" th:text="${error}"></p>
  	   </div>
        <form id="otpForm" th:action="@{/verify-otp}" method="post" onsubmit="mergeOtp()" novalidate>
          <div class="otp-group" id="otpGroup" aria-label="Enter 6-digit code">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<input type="hidden" name="email" th:value="${email}"/>
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp1" autocomplete="one-time-code" aria-label="Digit 1 of 6">
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp2" aria-label="Digit 2 of 6">
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp3" aria-label="Digit 3 of 6">
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp4" aria-label="Digit 4 of 6">
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp5" aria-label="Digit 5 of 6">
            <input class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp6" aria-label="Digit 6 of 6">
			<input type="hidden" name="otp" id="otp"/>
          </div>

          <div class="meta-row">
            <a class="link" href="/login" title="Back to sign in">Back to sign in</a>
            <div>
              <button class="resend" type="button" id="resendBtn" disabled>Resend code</button>
              <span id="resendTimer" aria-live="polite" style="margin-left:6px;">(30s)</span>
            </div>
          </div>

          <button class="btn-primary" type="submit" id="verifyBtn">
            <span class="btn-label">Verify</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>

          <div class="notice" id="otpNotice" role="status" aria-live="polite" aria-atomic="true"></div>
        </form>

        <div class="footer" th:text="'© ' + ${collegeName}+ ' – ERP System'"></div>
      </section>
    </main>
  </div>

  <script th:src="@{/js/verify-otp.js}"></script>
</body>
</html>
