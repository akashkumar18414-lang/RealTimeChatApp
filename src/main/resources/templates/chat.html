<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Chat | Real-Time ChatApp</title>
	<link th:href="@{/css/chat.css}" rel="stylesheet">

	<!-- Bootstrap + Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		:root {
			--bg: #f6f7fb;
			--card: #ffffff;
			--border: #e5e7eb;
			--muted: #6b7280;
			--primary: #0d6efd;
			--incoming: #f1f3f5;
			--outgoing: #e8f0ff;
		}
	</style>
</head>

<body>
	<div id="toast" class="toast-msg" th:data-message="${toastMessage}" th:data-type="${toastType}"></div>
	<div class="chat-wrapper" th:classappend="${chatType == 'ROOM'} ? ' room-layout' : 'global-wrapper-layout'">

		<!-- SIDEBAR (Room only) -->
		<aside class="sidebar" th:if="${chatType == 'ROOM'}">
			<div>
				<h6>Admin</h6>

				<div class="participant" th:if="${admin != null}">
				    <div>
				        <strong th:text="${admin.fullName}"></strong><br>
				        <small th:text="|@${admin.username}|"></small>
				    </div>
				</div>

				<div class="participant" th:if="${admin == null}">
				    <div>
				        <strong>No Admin</strong><br>
				        <small>@unknown</small>
				    
				</div>
				</div>
			</div>

			<div th:if="${isAdmin && roomType =='REQUEST'} " class="mt-2 mb-4">
				<h6 style="margin-top: auto;">Requests</h6>

				<div th:if="${#lists.isEmpty(joinRequests)}" class="text-muted">
					No join requests
				</div>

				<div th:each="m : ${joinRequests}" class="participant"
					style="flex-direction: column; align-items: baseline;">
					<div style="display: flex; align-items: center; gap: 8px;">
						<div class="avatar"
							th:text="${m.user != null && m.user.fullName != null ? #strings.substring(m.user.fullName,0,1) : '?'}">
						</div>

						<div>
							<div>
								<strong th:text="${m.user != null ? m.user.fullName : 'Unknown'}"></strong><br>
								<small th:text="'@'+${m.user.username}"></small>
							</div>
							<span class="text-muted small">Requested At: </span>
							<span th:text="${#temporals.format(m.requestedAt, 'hh:mm a')}"></span><br>
							<span th:text="${#temporals.format(m.requestedAt, 'dd MMM yyyy')}"></span>
						</div>
					</div>
					<div style="display: flex;justify-content: space-evenly; align-items: center; width: stretch;">
						<!-- Accept -->
						<form th:action="@{/approveJoinRequest/{id}(id=${m.id})}" method="post">
							<input type="hidden" name="requestId" th:value="${m.id}" />
							<button type="submit" class="btn btn-success btn-sm">Accept</button>
						</form>

						<!-- Reject -->
						<form th:action="@{/rejectJoinRequest/{id}(id=${m.id})}" method="post">
							<input type="hidden" name="requestId" th:value="${m.id}" />
							<button type="submit" class="btn btn-danger btn-sm">Reject</button>
						</form>
					</div>

				</div>
			</div>

			<div>
				<h6>Participants</h6>

				<div th:each="m : ${room.members}"
				     th:if="${room.createdBy == null || m.id != room.createdBy.id}"
				     class="participant">
					 <div class="avatar"
					      th:text="${m.fullName != null ? #strings.substring(m.fullName,0,1) : '?'}">
					 </div>
					<div>
						<strong th:text="${m.fullName}"></strong><br>
						<small th:text="'@'+${m.username}"></small>
					</div>
					<form th:action="@{/room/{roomId}/kick/{userId}(roomId=${room.id}, userId=${m.id})}" method="post"
						th:if="${isAdmin}">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<button class="btn btn-danger btn-sm" type="button"
							onclick="confirmAction(this.form,'Kick User', 'Are you sure you want to kick this user?', 'btn-danger')">Kick</button>
					</form>
				</div>
			</div>
		</aside>

		<!-- CHAT PANEL -->
		<main class="chat-panel" th:classappend="${chatType == 'GENERAL'} ? 'global-panel-layout' : ''">

			<!-- HEADER -->
			<div class="chat-header">
				<div>
					<h5 class="mb-0" th:text="${chatType == 'GENERAL' ? 'General Chat' : room.name}">
					</h5>
					<small class="text-muted"
						th:text="${chatType == 'GENERAL' ? 'Chat with everyone' : room.description}">
					</small>
				</div>

				<div class="d-flex gap-2 align-items-center">
					<span th:if="${chatType == 'ROOM'}" class="badge bg-light text-dark">
						<i class="bi bi-people"></i>
						<span th:text="${room.memberCount}"></span>
					</span>
					<!--<button type="button" class="btn btn-dark" onclick="startGame()">🎮 Play</button> -->
					
					<button class="btn btn-outline-dark" onclick="openThemePanel()">
					    🎨
					</button>
					<a th:href="@{/home}" class="btn btn-sm btn-outline-primary">
						←
					</a>
					
				</div>
			</div>
			<!--Theme-->
			<div id="themePanel" style="
			    position: fixed;
			    top: 20%;
			    right: 20px;
			    background: white;
			    padding: 15px;
			    border-radius: 10px;
			    display: none;
			    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
			    z-index: 1000;
			">
			    

			    <button onclick="setTheme('dark')">🌙 </button><br>
			    <button onclick="setTheme('light')">☀ </button><br>
			    <button onclick="setTheme('gradient')">🌈 </button><br>
			    <button onclick="setTheme('pastel')">🎨 </button><br>
			    <button onclick="setTheme('gaming')">🎮 </button><br>
			</div>
			<!--- History -->
			<div id="historySection" style="display:none; padding:15px;">
			    <h4>📜 Payment History</h4>
			    <div id="historyContent"></div>

			    <button onclick="closeHistory()" class="btn btn-secondary mt-2">
			        🔙 Back to Chat
			    </button>
			</div>

			<!-- MESSAGES -->
			<div class="chat-messages" id="chatBox">
				<!-- Messages inserted via JS -->
			</div>
			<div id="gameBoard" style="display:none; text-align:center; margin-top:10px;">
			    <h5>Tic Tac Toe</h5>
				<h6 id="status"></h6>
			    <div id="board" style="
			        display:grid;
			        grid-template-columns:repeat(3, 80px);
			        gap:5px;
			        justify-content:center;
			    "></div>
			</div>
			
			<!-- 💰 PAYMENT BUTTON -->
			<div style="padding: 10px;">
			    <button type="button" class="btn btn-success" onclick="openPayment()">
			        💰 Pay
			    </button>
				<!--<button type="button" class="btn btn-outline-dark ms-2" onclick="viewHistory()">
				    📜 History
				</button>-->
			</div>

			<!-- INPUT -->
			<form class="chat-input" id="chatForm">
				<input type="hidden" id="senderId" th:value="${user.id}">
				<input type="hidden" id="username" value="[[${#authentication.name}]]">
				<input type="hidden" id="senderName" th:value="${user.fullName}">
				<div style="position:relative; width:100%;">
				    <textarea id="messageInput"
				              class="form-control"
				              placeholder="Type a message..."
				              required></textarea>

				    <div id="emojiPicker" style="
				        display:none;
				        position:absolute;
				        bottom:55px;
				        left:0;
				        background:white;
				        border:1px solid #ddd;
				        border-radius:10px;
				        padding:10px;
				        max-width:250px;
				        z-index:999;
				    ">
				        <span onclick="addEmoji('😀')">😀</span>
				        <span onclick="addEmoji('😂')">😂</span>
				        <span onclick="addEmoji('😍')">😍</span>
				        <span onclick="addEmoji('😎')">😎</span>
				        <span onclick="addEmoji('😭')">😭</span>
				        <span onclick="addEmoji('🔥')">🔥</span>
				        <span onclick="addEmoji('❤️')">❤️</span>
				        <span onclick="addEmoji('👍')">👍</span>
				        <span onclick="addEmoji('🎉')">🎉</span>
				        <span onclick="addEmoji('🚀')">🚀</span>
				    </div>
				</div>

				<button type="button"
				        class="btn btn-light"
				        onclick="toggleEmojiPicker()">
				    😀
				</button>
				<input type="datetime-local" id="scheduleTime" class="form-control mt-2">
				<button type="button" id="sendMessageBtn" class="btn btn-primary" onclick="sendMessage()">
				    ➤
				</button>
				<button type="button" class="btn btn-warning" onclick="scheduleMessage()">
				    📅
				</button>
				<button onclick="replayChat()">▶</button>
				<button type="button" onclick="toggleRecording()" id="micBtn">🎤</button>
				<div id="recordingBar" style="
				    display:none;
				    background:#222;
				    color:white;
				    padding:10px;
				    border-radius:10px;
				    margin-top:5px;
				    text-align:center;
				">
				    🔴 Recording... Tap mic to stop
				</div>
				<div id="mentionList" style="
				    position:absolute;
				    background:white;
				    border:1px solid #ccc;
				    display:none;
				    max-height:150px;
				    overflow-y:auto;
				    width:200px;
				"></div>
				<audio id="notificationSound" preload="auto">
				    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
				</audio>
			</form>

		</main>
	</div>
	<!-- Confirm Action Modal -->
	<div class="modal fade" id="confirmActionModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content border-0 shadow">
				<div class="modal-header">
					<h5 class="modal-title" id="confirmTitle">Confirm action</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body" id="confirmMessage">
					Are you sure?
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-light" data-bs-dismiss="modal">
						Cancel
					</button>
					<button type="button" id="confirmBtn" class="btn">
						Confirm
					</button>
				</div>
			</div>
		</div>
	</div>
	
	<!-- 💰 PAYMENT MODAL -->
	<div class="modal fade" id="paymentModal" tabindex="-1">
	  <div class="modal-dialog">
	    <div class="modal-content p-3">

			<h5>💳 Generate Payment QR</h5>

			<!-- 🔥 NEW: UPI ID -->
			<input type="text" id="upiIdInput" class="form-control mb-2"
			       placeholder="Enter UPI ID (e.g. 9876543210@ybl)">

			<!-- 🔥 NEW: NAME -->
			<input type="text" id="nameInput" class="form-control mb-2"
			       placeholder="Enter Name">

			<!-- EXISTING -->
			<input type="number" id="amountInput" class="form-control mb-2"
			       placeholder="Enter amount">

			<input type="number" id="timerInput" class="form-control mb-2"
			       placeholder="Enter timer (seconds)" value="30">

			<button class="btn btn-primary w-100" onclick="generateQR()">
			    Generate QR
			</button>

			<div id="qrContainer" class="mt-3 text-center"></div>

			<div id="qrContainer" class="mt-3 text-center"></div>
	    </div>
	  </div>
	</div>
	
	<!-- Scripts -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

	<script>
		const CHAT_TYPE = "[[${chatType}]]";
		const ROOM_ID = "[[${roomId}]]";
		const USERNAME = "[[${user.username}]]";
	</script>

	<script th:src="@{/js/chat.js}"></script>

</body>

</html>
