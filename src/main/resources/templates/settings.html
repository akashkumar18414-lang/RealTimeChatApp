<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">⚙️ Settings</h3>

        <!-- FORM -->
        <form th:action="@{/settings/save}" method="post">

            <!-- Chat Lock -->
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" name="chatLocked"
                       th:checked="${user.chatLocked}">
                <label class="form-check-label">Enable Chat Lock 🔒</label>
            </div>

            <!-- Notifications -->
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" name="notificationsEnabled"
                       th:checked="${user.notificationsEnabled}">
                <label class="form-check-label">Enable Notifications 🔔</label>
            </div>

            <hr>

            <div class="d-flex justify-content-between">
                <!-- Back -->
                <button type="button" onclick="history.back()" class="btn btn-secondary">
                    ⬅ Back
                </button>

                <!-- Save -->
                <button type="submit" class="btn btn-primary">
                    💾 Save Changes
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
