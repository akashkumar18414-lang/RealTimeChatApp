<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>College ERP – Verify Code</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" th:href="@{/css/forgot-password.css}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <!-- Theme toggle -->
    <button class="theme-switch" id="themeToggle" aria-label="Toggle dark mode">
      <span class="icon" aria-hidden="true" id="themeIcon">🌙 </span>
      <span id="themeText">Light</span>
    </button>

    <main class="card" role="main" id="card">
      <section class="right">
        <div class="pane-wrap" id="paneWrap" aria-live="polite">
          <!-- Pane 1: Enter identifier -->
          <section class="pane is-active" id="paneEnter" aria-hidden="false">
            <header class="form-header" aria-labelledby="titleEnter">
              <div class="form-logo">
                <div class="mark" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M2 9l10-5 10 5-10 5L2 9z"></path>
                  </svg>
                </div>
                <span th:text="${collegeName} + '• ERP'"></span>
              </div>
              <h1 class="form-title" id="titleEnter">Verify your identity</h1>
			  <div th:if="${error}">
		  	       <p style="color:red;" th:text="${error}"></p>
		  	   </div>
              <p class="form-subtitle">Enter your username. We’ll send a 6-digit code to your registered email.</p>
            </header>

            <form id="enterForm" th:action="@{/send-otp}" method="post" novalidate>
              <div>
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input class="input" type="text" id="identifier" th:name="username" placeholder="Enter your username" autocomplete="username" required>
              </div>

              <button class="btn-primary" type="submit" id="sendBtn">
                <span class="btn-label">Send code</span>
                <span class="spinner" aria-hidden="true"></span>
              </button>

              <div class="notice" id="enterNotice" role="status" aria-live="polite" aria-atomic="true"></div>

              <div class="meta-row" style="margin-top:6px;">
                <a class="link" href="/login" title="Back to sign in">Back to sign in</a>
              </div>
            </form>
          </section>
    </main>
  </div>

  <script th:src="@{/js/forgot-password.js}"></script>
</body>
</html>
