<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Join Room</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<style>
		body {
			min-height: 100vh;
			background: radial-gradient(circle at top, #eef3ff 0%, #f7f9fc 40%, #f9fafb 100%);
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
		}

		.join-card {
			width: 100%;
			max-width: 480px;
			background: #fff;
			border-radius: 18px;
			padding: 2rem;
			box-shadow:
				0 30px 60px rgba(15, 23, 42, 0.12),
				0 8px 16px rgba(15, 23, 42, 0.06);
			animation: fadeUp .4s ease;
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.room-title {
			font-size: 1.6rem;
			font-weight: 600;
		}

		.room-desc {
			color: #6c757d;
			font-size: .95rem;
		}

		.meta-row {
			display: flex;
			align-items: center;
			gap: .6rem;
			font-size: .95rem;
			color: #495057;
		}

		.meta-row i {
			font-size: 1.05rem;
			color: #0d6efd;
		}

		.divider {
			height: 1px;
			background: linear-gradient(to right, transparent, #e5e7eb, transparent);
			margin: 1.5rem 0;
		}

		.btn-primary {
			padding: .75rem;
			font-size: 1rem;
			font-weight: 500;
			border-radius: 12px;
		}

		.btn-light {
			border-radius: 12px;
		}

		.badge-soft {
			background: rgba(13, 110, 253, .1);
			color: #0d6efd;
			font-weight: 500;
		}
	</style>
</head>

<body>

	<div class="join-card">

		<!-- Header -->
		<div class="text-center mb-3">
			<h2 class="room-title mb-1" th:text="${room.name}">Unlisted</h2>
			<p class="room-desc" th:text="${room.description}">
				Unlisted Open group
			</p>
		</div>

		<div class="divider"></div>

		<!-- Room Meta -->
		<div class="d-grid gap-3 mb-4">
			<div class="meta-row">
				<i class="bi bi-people"></i>
				<span>
					<strong th:text="${room.memberCount}">1</strong>
					/
					<span th:text="${room.maxMembers}">100</span>
					members
				</span>
			</div>

			<div class="meta-row">
				<i class="bi bi-globe"></i>
				<span th:text="${room.preferredCountry}">INDIA</span>
			</div>

			<div class="meta-row">
				<i class="bi bi-eye"></i>
				<span class="badge badge-soft" th:text="${room.visibility}">UNLISTED</span>
			</div>

			<div class="meta-row">
				<i class="bi bi-shield-check"></i>
				<span class="badge badge-soft" th:text="${room.joinPolicy}">OPEN</span>
			</div>
		</div>

		<!-- Actions -->
		<div class="d-grid gap-2">

			<!-- OPEN -->
			<form th:if="${room.joinPolicy.name() == 'OPEN'}" th:action="@{/joinRoom/{id}(id=${room.id})}"
				method="post">
				<button type="submit" class="btn btn-primary w-100" th:disabled="${room.full}">
					<i class="bi bi-box-arrow-in-right me-1"></i>
					<span th:text="${room.full ? 'Room Full' : 'Join Room'}"></span>
				</button>
			</form>

			<!-- REQUEST -->
			<form th:if="${room.joinPolicy.name() == 'REQUEST'}" th:action="@{/requestToJoinRoom/{id}(id=${room.id})}"
				method="post">
				<button type="submit" class="btn btn-primary w-100" th:disabled="${room.full}">
					<i class="bi bi-send me-1"></i>
					<span th:text="${room.full ? 'Room Full' : 'Request to Join'}"></span>
				</button>
			</form>

			<!-- CLOSED -->
			<button th:if="${room.joinPolicy.name() == 'CLOSED'}" class="btn btn-secondary w-100" disabled>
				<i class="bi bi-lock-fill me-1"></i>
				Room is closed.
			</button>

			<!-- Back -->
			<a th:href="@{/home}" class="btn btn-light w-100">
				<i class="bi bi-arrow-left me-1"></i>
				Back to Home
			</a>

		</div>

	</div>

</body>

</html>
